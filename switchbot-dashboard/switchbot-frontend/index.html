<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Temp Master Dashboard</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5.3.3 CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">

  <style>
    :root {
      --bs-body-font-family: 'Inter', sans-serif;
      --bg-main: #f0f2f5;
      --card-bg: #ffffff;
    }
    body {
      background-color: var(--bg-main);
      padding-top: 72px;
      font-family: 'Inter', sans-serif;
    }
    .navbar-brand {
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .meter-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .meter-stats .badge {
      font-size: 0.85rem;
      margin-right: 6px;
      padding: 5px 10px;
      font-weight: 500;
    }
    .meter-stats {
      margin-bottom: 12px;
    }
    .meter-chart-wrap {
      position: relative;
      height: 280px;
    }
    .meter-last-updated {
      color: #888;
      font-size: 0.75rem;
      margin-top: 10px;
      margin-bottom: 0;
    }
    footer {
      text-align: center;
      color: #999;
      font-size: 0.75rem;
      margin: 40px 0 24px 0;
    }
    #loading {
      text-align: center;
      padding: 48px 0;
    }
    .device-type-tag {
      font-size: 0.7rem;
      color: #666;
      background-color: #eef0f3;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 500;
    }
    .card {
      border: none;
    }
    .card-header {
      background-color: var(--card-bg);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand navbar-dark bg-dark fixed-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Temp Master Dashboard</a>
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link active" href="/">Dashboard</a>
        </li>
      </ul>
      <div class="d-flex align-items-center">
        <span id="connection-status" class="badge bg-success">Connected</span>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-3 px-md-4">

    <!-- Controls -->
    <div class="card shadow-sm mb-3">
      <div class="card-body py-2">
        <div class="row g-2 align-items-center">
          <div class="col-auto">
            <label for="time-scale-select" class="col-form-label fw-medium">Time Range:</label>
          </div>
          <div class="col-auto">
            <select id="time-scale-select" class="form-select form-select-sm">
              <option value="hour">Last Hour</option>
              <option value="day" selected>Last 24 Hours</option>
              <option value="week">Last 7 Days</option>
              <option value="month">Last 30 Days</option>
              <option value="year">Last Year</option>
            </select>
          </div>
          <div class="col-auto">
            <button type="button" id="btn-refresh" class="btn btn-primary btn-sm">Refresh Data</button>
          </div>
          <div class="col-auto">
            <button type="button" id="btn-backup" class="btn btn-outline-secondary btn-sm">Download Backup</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div id="status-bar" class="alert alert-info d-flex justify-content-between align-items-center d-none">
      <span id="status-meters-count">Monitoring 0 meters</span>
      <span id="status-last-refresh"></span>
    </div>

    <!-- Rate Limit Warning -->
    <div id="rate-limit-warning" class="alert alert-warning d-none">
      <strong>Rate Limited.</strong>
      <span id="rate-limit-text">SwitchBot API rate limit reached.</span>
    </div>

    <!-- Loading -->
    <div id="loading">
      <div class="spinner-border text-secondary mb-2" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="text-muted">Loading temperature data...</p>
    </div>

    <!-- Error -->
    <div id="error" class="alert alert-danger d-none">
      <strong>Error.</strong> <span id="error-text">Failed to fetch data.</span>
    </div>

    <!-- Meters Container -->
    <div id="meters-container"></div>

    <!-- Footer -->
    <footer>
      Temp Master Dashboard v2.0
    </footer>

  </div>

  <!-- Bootstrap 5.3.3 JS Bundle -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

  <!-- Chart.js 4.5.0 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>

  <script>
    // ============================================================
    // Global variables
    // ============================================================

    const API_URL = (window.location.protocol === 'file:') ? 'https://temp-master.fly.dev' : '';

    const REFRESH_INTERVAL = 30000;
    let currentTimeScale = 'day';
    let metersData = [];
    let statusData = null;
    const charts = {};

    const DISPLAY_NAMES = {
      'Bedroom Meter': '第1蒸留塔 (T-101)',
      'Living Meter': '第2蒸留塔 (T-102)',
      '2世': '反応器 (R-201)',
      '夢男': '熱交換器 (E-301)',
      '夢': '熱交換器 (E-302)',
      'アワコ': '冷却塔 (CT-401)',
      'ジャガ百万石': '加熱炉 (H-501)',
      'ネズミ': 'コンプレッサー (C-601)',
      'バロン': '遠心分離機 (S-701)',
      'ゴンタ': '混合槽 (M-801)',
      '蛇棚': '貯蔵タンク (TK-901)',
      '中華棚': '貯蔵タンク (TK-902)',
      'へておケージ': '配管ライン (PL-1001)',
      '外': '屋外モニター (EM-1101)',
      'インキュベーター': '乾燥機 (D-1201)',
      'ビアク': '吸収塔 (A-1301)',
      'ブロッチ Hot Spot': 'フレアスタック (FS-1401)',
      'マダラアオジタ': 'ボイラー (B-1501)',
    };

    const getDisplayName = (deviceName) => DISPLAY_NAMES[deviceName] || deviceName;

    // ============================================================
    // Utility functions
    // ============================================================

    const escapeHtml = (str) => {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    };

    const pad2 = (n) => (n < 10 ? '0' + n : '' + n);

    const formatTimestamp = (timestamp, timeScale) => {
      const date = new Date(timestamp);
      const hours = pad2(date.getHours());
      const minutes = pad2(date.getMinutes());
      const dayShort = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][date.getDay()];
      const monthShort = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'][date.getMonth()];
      const dayNum = date.getDate();

      switch (timeScale) {
        case 'hour':
        case 'day':
          return `${hours}:${minutes}`;
        case 'week':
          return `${dayShort} ${hours}`;
        case 'month':
        case 'year':
          return `${monthShort} ${dayNum}`;
        default:
          return date.toLocaleString();
      }
    };

    // ============================================================
    // DOM helpers
    // ============================================================

    const $ = (selector) => document.querySelector(selector);
    const $id = (id) => document.getElementById(id);

    const showEl = (el) => { if (el) el.classList.remove('d-none'); };
    const hideEl = (el) => { if (el) el.classList.add('d-none'); };

    // ============================================================
    // API calls (fetch + async/await)
    // ============================================================

    async function fetchMeters() {
      const resp = await fetch(`${API_URL}/api/meters`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }

    async function fetchStatus() {
      const resp = await fetch(`${API_URL}/api/status`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }

    async function fetchHistory(deviceId, timeScale) {
      const params = new URLSearchParams({ time_scale: timeScale });
      const resp = await fetch(`${API_URL}/api/meters/${encodeURIComponent(deviceId)}/history?${params}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }

    async function triggerRefresh() {
      const resp = await fetch(`${API_URL}/api/meters/refresh`, { method: 'POST' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }

    // ============================================================
    // Top-level data load (Promise.all + async/await)
    // ============================================================

    async function fetchData() {
      try {
        const [metersResp, statusResp] = await Promise.all([
          fetchMeters(),
          fetchStatus(),
        ]);
        metersData = metersResp.meters ?? [];
        statusData = statusResp;

        hideEl($id('loading'));
        hideEl($id('error'));

        const badge = $id('connection-status');
        badge.className = 'badge bg-success';
        badge.textContent = 'Connected';

        updateStatusBar();
        renderMeters();
        renderCharts();
      } catch (err) {
        showError(`データ取得に失敗: ${err.message}`);
      }
    }

    function showError(msg) {
      hideEl($id('loading'));
      $id('error-text').textContent = msg;
      showEl($id('error'));

      const badge = $id('connection-status');
      badge.className = 'badge bg-danger';
      badge.textContent = 'Disconnected';
    }

    // ============================================================
    // Status bar / rate limit
    // ============================================================

    function updateStatusBar() {
      const bar = $id('status-bar');
      if (!statusData) {
        hideEl(bar);
        return;
      }

      const count = statusData.meters_count || 0;
      const noun = count === 1 ? 'meter' : 'meters';
      $id('status-meters-count').textContent = `Monitoring ${count} ${noun}`;

      const now = new Date();
      $id('status-last-refresh').textContent =
        `Last refresh: ${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;
      showEl(bar);

      if (statusData.is_rate_limited) {
        const remaining = statusData.backoff_remaining || 0;
        $id('rate-limit-text').textContent =
          `SwitchBot API rate limit reached. Retry in ${remaining} seconds.`;
        showEl($id('rate-limit-warning'));
      } else {
        hideEl($id('rate-limit-warning'));
      }
    }

    // ============================================================
    // Rendering
    // ============================================================

    function renderMeters() {
      let html = '<div class="row g-3">';
      for (const meter of metersData) {
        html += `<div class="col-md-4 col-sm-6">${createMeterCard(meter)}</div>`;
      }
      html += '</div>';
      $id('meters-container').innerHTML = html;
    }

    function createMeterCard(meter) {
      const deviceId = escapeHtml(meter.device_id);
      const deviceName = escapeHtml(getDisplayName(meter.device_name));
      const deviceType = escapeHtml(meter.device_type);

      let statsHtml = '';
      if (meter.current_temperature !== null && meter.current_temperature !== undefined) {
        statsHtml += `<span class="badge bg-danger">${escapeHtml(meter.current_temperature)}\u00b0C</span>`;
      }
      if (meter.current_humidity !== null && meter.current_humidity !== undefined) {
        statsHtml += `<span class="badge bg-info text-dark">${escapeHtml(meter.current_humidity)}%</span>`;
      }
      if (meter.battery !== null && meter.battery !== undefined) {
        statsHtml += `<span class="badge bg-success">${escapeHtml(meter.battery)}%</span>`;
      }

      let lastUpdatedHtml = '';
      if (meter.last_updated) {
        const d = new Date(meter.last_updated);
        lastUpdatedHtml = `<p class="meter-last-updated">Last updated: ${escapeHtml(d.toLocaleString())}</p>`;
      }

      return `
        <div class="card shadow-sm h-100">
          <div class="card-header">
            <div class="meter-panel-header">
              <strong>${deviceName}</strong>
              <span class="device-type-tag">${deviceType}</span>
            </div>
          </div>
          <div class="card-body">
            <div class="meter-stats">${statsHtml}</div>
            <div class="meter-chart-wrap">
              <canvas id="chart-${deviceId}"></canvas>
            </div>
            ${lastUpdatedHtml}
          </div>
        </div>`;
    }

    // ============================================================
    // Chart rendering (Chart.js v4 API)
    // ============================================================

    function renderCharts() {
      for (const meter of metersData) {
        fetchHistory(meter.device_id, currentTimeScale)
          .then((data) => {
            const history = data?.history ?? [];
            renderSingleChart(meter.device_id, history);
          })
          .catch(() => {});
      }
    }

    function renderSingleChart(deviceId, history) {
      const canvas = document.getElementById('chart-' + deviceId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      const labels = [];
      const temperatures = [];
      for (const entry of history) {
        labels.push(formatTimestamp(entry.timestamp, currentTimeScale));
        temperatures.push(entry.temperature);
      }

      if (charts[deviceId]) {
        charts[deviceId].destroy();
        delete charts[deviceId];
      }

      charts[deviceId] = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Temperature (C)',
            data: temperatures,
            borderColor: '#dc3545',
            backgroundColor: 'rgba(220, 53, 69, 0.12)',
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: '#dc3545',
            pointBorderColor: '#dc3545',
            pointHoverRadius: 5,
            pointHoverBackgroundColor: '#0dcaf0',
            fill: true,
            tension: 0.4,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false,
            },
            tooltip: {
              mode: 'index',
              intersect: false,
              callbacks: {
                label: (tooltipItem) => {
                  const v = tooltipItem.parsed.y;
                  if (v === null || v === undefined) return '';
                  return `${v.toFixed(1)}\u00b0C`;
                },
              },
            },
          },
          scales: {
            x: {
              display: true,
              grid: {
                display: true,
                color: 'rgba(0, 0, 0, 0.05)',
              },
              ticks: {
                maxTicksLimit: 8,
                font: { size: 10 },
                color: '#777',
              },
            },
            y: {
              display: true,
              grid: {
                display: true,
                color: 'rgba(0, 0, 0, 0.05)',
              },
              ticks: {
                font: { size: 10 },
                color: '#777',
                callback: (value) => `${Number(value.toFixed(1))}\u00b0`,
              },
            },
          },
        },
      });
    }

    function destroyAllCharts() {
      for (const key of Object.keys(charts)) {
        if (charts[key]) {
          charts[key].destroy();
        }
      }
      for (const key of Object.keys(charts)) {
        delete charts[key];
      }
    }

    // ============================================================
    // Init
    // ============================================================

    document.addEventListener('DOMContentLoaded', () => {
      fetchData();
      setInterval(fetchData, REFRESH_INTERVAL);

      $id('time-scale-select').addEventListener('change', (e) => {
        currentTimeScale = e.target.value;
        destroyAllCharts();
        renderCharts();
      });

      $id('btn-refresh').addEventListener('click', async () => {
        const btn = $id('btn-refresh');
        btn.disabled = true;
        btn.textContent = 'Refreshing...';
        try {
          await triggerRefresh();
        } catch (err) {
          showError(`Failed to refresh: ${err.message}`);
        }
        await fetchData();
        btn.disabled = false;
        btn.textContent = 'Refresh Data';
      });

      $id('btn-backup').addEventListener('click', () => {
        window.open(`${API_URL}/api/backup`, '_blank');
      });
    });
  </script>

</body>
</html>
