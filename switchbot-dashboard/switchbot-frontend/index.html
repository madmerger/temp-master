<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Temp Master Dashboard</title>

  <!-- Bootstrap 3.3.7 CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-default navbar-fixed-top">
    <div class="container-fluid">
      <div class="navbar-header">
        <a class="navbar-brand" href="#">Temp Master Dashboard</a>
      </div>
      <ul class="nav navbar-nav">
        <li class="active"><a href="/">Dashboard</a></li>
      </ul>
      <div class="navbar-status pull-right">
        <span id="connection-status" class="label label-success">Connected</span>
      </div>
    </div>
  </nav>

  <div class="container-fluid">

    <!-- Controls -->
    <div class="panel panel-default">
      <div class="panel-body">
        <form class="form-inline">
          <div class="form-group" style="margin-right: 20px;">
            <label for="time-scale-select" style="margin-right: 8px;">Time Range:</label>
            <select id="time-scale-select" class="form-control">
              <option value="hour">Last Hour</option>
              <option value="day" selected>Last 24 Hours</option>
              <option value="week">Last 7 Days</option>
              <option value="month">Last 30 Days</option>
              <option value="year">Last Year</option>
            </select>
          </div>
          <button type="button" id="btn-refresh" class="btn btn-primary">Refresh Data</button>
          <button type="button" id="btn-backup" class="btn btn-default">Download Backup</button>
        </form>
      </div>
    </div>

    <!-- Status Bar -->
    <div id="status-bar" class="alert alert-info" style="display: none;">
      <span id="status-meters-count">Monitoring 0 meters</span>
      <span class="pull-right" id="status-last-refresh"></span>
    </div>

    <!-- Rate Limit Warning -->
    <div id="rate-limit-warning" class="alert alert-warning" style="display: none;">
      <strong>Rate Limited.</strong>
      <span id="rate-limit-text">SwitchBot API rate limit reached.</span>
    </div>

    <!-- Loading -->
    <div id="loading">
      <p class="text-muted">Loading temperature data...</p>
    </div>

    <!-- Error -->
    <div id="error" class="alert alert-danger" style="display: none;">
      <strong>Error.</strong> <span id="error-text">Failed to fetch data.</span>
    </div>

    <!-- Meters Container -->
    <div id="meters-container"></div>

    <!-- Footer -->
    <footer>
      Temp Master Dashboard v1.0 - Built with jQuery + Bootstrap 3
    </footer>

  </div>

  <!-- jQuery 1.12.x -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>

  <!-- Bootstrap 3.3.7 JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>

  <!-- Chart.js 2.9.x -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>

  <script src="js/app.js"></script>

</body>
</html>
