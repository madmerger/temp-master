name: Windows Native UI

on:
  push:
    branches: [main]
    paths:
      - 'windows-native/**'
      - '.github/workflows/windows-native.yml'
  pull_request:
    branches: [main]
    paths:
      - 'windows-native/**'
      - '.github/workflows/windows-native.yml'

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows-native

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build
